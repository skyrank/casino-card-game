    <!-- IFRAME/AD SCRIPT PROTECTION -->
    <script>
      (function() {
        'use strict';
        
        // Detect iframe mode
        window.__CASINO_IN_IFRAME = false;
        try {
          window.__CASINO_IN_IFRAME = (window.self !== window.top);
        } catch (e) {
          window.__CASINO_IN_IFRAME = true;
        }
        
        // Prevent googletag errors
        window.googletag = window.googletag || {};
        window.googletag.cmd = window.googletag.cmd || [];
        
        // Protect jQuery if exists
        if (typeof window.$ !== 'undefined') {
          window.__CASINO_$ = window.$;
        }
        if (typeof window.jQuery !== 'undefined') {
          window.__CASINO_jQuery = window.jQuery;
        }
        
        console.log('[Casino] Protection initialized. Iframe mode:', window.__CASINO_IN_IFRAME);
      })();
    </script>
